<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="card" style="max-width:420px;margin:60px auto;text-align:center;">
  <h2>Admin Login</h2>
  {% if error %}<div class="error" style="color:red;margin-bottom:10px">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="text" name="username" placeholder="Username" required style="width:85%;padding:8px;margin:6px 0"><br>
    <input type="password" name="password" placeholder="Password" required style="width:85%;padding:8px;margin:6px 0"><br>
    <button style="padding:10px 20px">Login</button>
  </form>
</div>
</body>
</html>
